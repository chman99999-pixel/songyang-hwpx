<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감사합니다 센터 송영서비스 정산기</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #fef6ee 0%, #fdf2f8 50%, #f0fdf4 100%); min-height: 100vh; padding: 24px 16px; font-size: 18px; color: #333; }

  .container { max-width: 1000px; margin: 0 auto; }

  /* 헤더 */
  .header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; padding: 28px 32px; background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
  .header img { width: 80px; height: 80px; object-fit: contain; border-radius: 16px; }
  .header-text h1 { font-size: 28px; color: #2d2d2d; font-weight: 800; letter-spacing: -0.5px; }
  .header-text p { font-size: 17px; color: #888; margin-top: 6px; line-height: 1.5; }

  /* 업로드 카드 */
  .upload-card { background: #fff; border-radius: 20px; padding: 28px 32px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
  .upload-card h2 { font-size: 20px; font-weight: 700; color: #444; margin-bottom: 20px; }
  .file-row { display: flex; flex-direction: row; align-items: center; gap: 16px; padding: 18px 20px; margin-bottom: 12px; background: #fafafa; border: 2px dashed #e0e0e0; border-radius: 14px; transition: all 0.2s; flex-wrap: nowrap; }
  .file-row:hover { border-color: #e8913a; background: #fff8f0; }
  .file-row .step { display: flex; align-items: center; justify-content: center; min-width: 44px; width: 44px; height: 44px; border-radius: 12px; font-size: 20px; font-weight: 800; color: #fff; flex-shrink: 0; }
  .file-row:nth-child(2) .step { background: linear-gradient(135deg, #e8913a, #f0a050); }
  .file-row:nth-child(3) .step { background: linear-gradient(135deg, #d64070, #e85080); }
  .file-row:nth-child(4) .step { background: linear-gradient(135deg, #8db600, #a0c800); }
  .file-row label { white-space: nowrap; font-size: 18px; font-weight: 600; color: #555; cursor: pointer; min-width: 220px; }
  .file-row input[type="file"] { font-size: 16px; flex: 1; min-width: 0; }
  .hint { font-size: 15px; color: #aaa; margin-top: 4px; padding-left: 60px; }

  /* 생성 버튼 */
  .btn { display: block; width: 100%; padding: 20px; background: linear-gradient(135deg, #e8913a 0%, #d64070 100%); color: #fff; border: none; border-radius: 14px; font-size: 22px; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: 1px; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 16px rgba(214,64,112,0.25); }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(214,64,112,0.35); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }

  /* 메시지 */
  .msg { margin-top: 16px; padding: 16px 20px; border-radius: 14px; font-size: 18px; font-weight: 600; }
  .msg.ok { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
  .msg.err { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

  /* 진행 표시 */
  #progress { display: none; margin-top: 16px; padding: 18px 24px; background: linear-gradient(135deg, #eff6ff, #f0f9ff); border: 1px solid #bfdbfe; border-radius: 14px; font-size: 18px; font-weight: 600; color: #2563eb; }

  /* 결과 영역 */
  .result { margin-top: 28px; background: #fff; border-radius: 20px; padding: 28px 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
  .result h2 { font-size: 24px; font-weight: 800; color: #2d2d2d; margin-bottom: 6px; }
  .result .info { font-size: 17px; color: #888; margin-bottom: 20px; }
  .dl-btn { display: inline-flex; align-items: center; gap: 8px; padding: 16px 32px; background: linear-gradient(135deg, #e8913a, #d64070); color: #fff; border-radius: 12px; text-decoration: none; font-size: 20px; font-weight: 700; margin-bottom: 20px; cursor: pointer; border: none; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 16px rgba(214,64,112,0.25); }
  .dl-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(214,64,112,0.35); }

  /* 결과 테이블 */
  table.data { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 16px; margin-top: 12px; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; }
  table.data th { background: linear-gradient(135deg, #f8f4f0, #f5f0f8); padding: 14px 10px; text-align: center; font-weight: 700; font-size: 15px; color: #555; border-bottom: 2px solid #e5e7eb; }
  table.data td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #f0f0f0; font-size: 16px; }
  table.data tbody tr:hover { background: #fef7f0; }
  table.data tbody tr:last-child td { border-bottom: none; }

  /* 예외 표시 */
  table.data tr.has-exception { background: #fffbeb; }
  table.data tr.has-exception td { color: #d97706; font-weight: 600; }
  .exc-badge { display: inline-block; font-size: 13px; padding: 3px 8px; border-radius: 6px; margin-left: 4px; font-weight: 700; }
  .exc-badge.early { background: #ffedd5; color: #c2410c; }
  .exc-badge.late { background: #f3e8ff; color: #7c3aed; }
  .exc-badge.extra { background: #dbeafe; color: #1d4ed8; }
  .exc-badge.partial { background: #ffe4e6; color: #be123c; }

  .warn-list { margin: 16px 0; padding: 16px 20px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px; font-size: 16px; color: #92400e; line-height: 1.7; }

  .exc-detail { margin: 16px 0; padding: 20px 24px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 14px; font-size: 16px; }
  .exc-detail h3 { margin: 0 0 12px; font-size: 19px; font-weight: 700; color: #d97706; }
  .exc-detail .exc-user { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #fef3c7; }
  .exc-detail .exc-user:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .exc-detail .exc-user strong { color: #2d2d2d; font-size: 17px; }
  .exc-detail .exc-item { margin-left: 16px; margin-top: 4px; color: #78716c; font-size: 15px; line-height: 1.6; }

  @media (max-width: 580px) {
    body { padding: 12px 8px; }
    .header { flex-direction: column; text-align: center; padding: 20px; }
    .file-row { flex-direction: column; align-items: stretch; gap: 8px; }
    .file-row label { min-width: auto; }
    .hint { padding-left: 0; }
    table.data { font-size: 14px; }
    table.data th, table.data td { padding: 8px 4px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <img src="로고-3d-1.jpeg" alt="로고">
    <div class="header-text">
      <h1>감사합니다 센터 송영서비스 정산기</h1>
      <p>원본 송영서비스 한글 파일, 엑셀 바우처 데이터, 이용자 송영정보를 업로드하면<br>월/날짜/시간/비용이 자동 계산된 한글 문서를 생성합니다.</p>
    </div>
  </div>

  <div class="upload-card">
    <h2>파일 업로드</h2>
    <div class="file-row">
      <div class="step">1</div>
      <label>송영서비스 한글파일 (.hwpx)</label>
      <input type="file" id="hwpxFile" accept=".hwpx">
    </div>
    <div class="file-row">
      <div class="step">2</div>
      <label>송영 바우처 엑셀파일 (.xlsx)</label>
      <input type="file" id="excelFile" accept=".xlsx,.xls">
    </div>
    <div class="file-row">
      <div class="step">3</div>
      <label>이용자 송영정보 엑셀파일 (.xlsx)</label>
      <input type="file" id="tripFile" accept=".xlsx,.xls">
    </div>
    <p class="hint">송영정보: 이용자별 오전/오후 송영 시간이 기재된 파일</p>
    <button class="btn" id="genBtn" onclick="doGenerate()">송영 정산 문서 생성하기</button>
  </div>

  <div id="progress">처리 중...</div>
  <div id="msgArea"></div>
  <div id="resultArea"></div>
</div>

<script>
function parseTripInfo(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        let headerIdx = -1;
        for (let i = 0; i < Math.min(rows.length, 10); i++) {
          if (rows[i].some(c => String(c).includes('이용자'))) { headerIdx = i; break; }
        }
        if (headerIdx < 0) { resolve({}); return; }
        const info = {};
        for (let i = headerIdx + 1; i < rows.length; i++) {
          const r = rows[i];
          const name = String(r[1] || '').trim();
          if (!name || name.includes('총')) continue;
          const amStr = String(r[2] || '-').trim();
          const pmStr = String(r[3] || '-').trim();
          const amM = amStr.match(/(\d+)/);
          const pmM = pmStr.match(/(\d+)/);
          info[name] = { am_min: amM ? parseInt(amM[1]) : null, pm_min: pmM ? parseInt(pmM[1]) : null };
        }
        resolve(info);
      } catch(err) { reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

function parseExcel(file, tripInfo) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:false});
        let headerIdx = -1, headers = {};
        for (let i = 0; i < Math.min(rows.length, 10); i++) {
          const idx = rows[i].findIndex(c => String(c).includes('서비스유형'));
          if (idx >= 0) { headerIdx = i; break; }
        }
        if (headerIdx < 0) { reject('서비스유형 헤더를 찾을 수 없습니다.'); return; }
        rows[headerIdx].forEach((v, ci) => { if (v) headers[String(v).trim()] = ci; });

        const svcCol = headers['서비스유형'];
        const nameCol = headers['대상자명'];
        const groupCol = headers['대상자 인원'];
        const dateCol = headers['승인일시'];
        const settlementCol = headers['결제구분'];
        const timeCol = headers['총시간'];
        const users = {};
        let month = null;

        // 총시간 파싱: '00100'→60분, '00030'→30분
        function parseTime(s) {
          s = String(s||'').trim();
          if (!s || s.length < 5) return 0;
          const h = parseInt(s.substring(0, 3)) || 0;
          const m = parseInt(s.substring(3)) || 0;
          return h * 60 + m;
        }

        for (let i = headerIdx + 1; i < rows.length; i++) {
          const r = rows[i];
          if (String(r[svcCol] || '').trim() !== '송영서비스') continue;
          if (settlementCol !== undefined && String(r[settlementCol] || '').trim() === '승인취소') continue;
          const name = String(r[nameCol] || '').trim();
          if (!name) continue;
          if (!users[name]) users[name] = { name, group_str: String(r[groupCol] || '').trim(), dates: [], am_dates: [], pm_dates: [], row_times: [] };
          const dStr = String(r[dateCol] || '').trim();
          const rowMin = timeCol !== undefined ? parseTime(r[timeCol]) : 0;
          if (dStr) {
            const d = new Date(dStr);
            if (!isNaN(d)) {
              users[name].dates.push(d);
              users[name].row_times.push({ date: d, min: rowMin });
              if (!month) month = d.getMonth() + 1;
            }
          }
        }

        function fmtH(min) {
          const h = Math.floor(min/60), m = min%60;
          if (h>0 && m>0) return `${h}시간${m}분`;
          if (h>0) return `${h}시간`;
          if (m>0) return `${m}분`;
          return '0시간';
        }
        const fmtD = d => `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
        function dateRange(arr) {
          if (!arr.length) return '';
          arr.sort((a,b) => a-b);
          if (arr.length === 1) return fmtD(arr[0]);
          return `${fmtD(arr[0])}~${fmtD(arr[arr.length-1])}`;
        }

        for (const name of Object.keys(users)) {
          const u = users[name];
          const gs = u.group_str;
          if (gs.includes('집중') || gs.includes('1인')) u.unit_price = 25910;
          else if (gs.includes('2인')) u.unit_price = 17270;
          else u.unit_price = 13820;
          u.dates.sort((a,b) => a-b);
          u.day_count = u.dates.length;
          u.date_range = dateRange(u.dates);

          const ti = tripInfo[name] || {};
          u.am_min = ti.am_min || null;
          u.pm_min = ti.pm_min || null;

          // 송영정보에 없는 이용자: 바우처 데이터에서 추론
          if (!u.am_min && !u.pm_min && u.row_times.length > 0) {
            const typicalMin = u.row_times.map(rt => rt.min).sort((a,b) => a-b)[Math.floor(u.row_times.length/2)];
            if (typicalMin >= 60) { u.am_min = 30; u.pm_min = 30; }
            else { u.am_min = typicalMin || 30; }
          }

          // 방향별 일수 계산: 총시간으로 추가 방향/부분일 감지
          const amDates = [], pmDates = [], excDates = [];
          let detectedExtraMin = null;
          let excPerMin = 30; // 3번줄 per-trip 분 (기본 30분)
          u.exceptions = []; // 예외상황 기록
          const fmtDate = d => `${d.getMonth()+1}/${d.getDate()}`;
          for (const rt of u.row_times) {
            const actual = rt.min;
            if (u.am_min && u.pm_min) {
              // 양방향 이용자
              const expected = u.am_min + u.pm_min;
              if (actual >= expected) {
                amDates.push(rt.date); pmDates.push(rt.date);
              } else if (u.am_min !== u.pm_min && actual !== u.am_min && actual !== u.pm_min) {
                // 오전≠오후이고, 해당일 시간이 오전/오후 어느 쪽에도 안 맞는 경우 → 3번줄
                excDates.push(rt.date);
                excPerMin = actual;
                u.exceptions.push({ date: rt.date, type: 'partial_day', desc: `${fmtDate(rt.date)} ${actual}분 (3번줄 별도 표시)` });
              } else if (u.am_min !== u.pm_min) {
                // 오전 또는 오후 한쪽만 해당
                if (Math.abs(actual - u.am_min) <= Math.abs(actual - u.pm_min)) {
                  amDates.push(rt.date);
                  u.exceptions.push({ date: rt.date, type: 'am_only', desc: `${fmtDate(rt.date)} 오전 송영만 (${actual}분)` });
                } else {
                  pmDates.push(rt.date);
                  u.exceptions.push({ date: rt.date, type: 'pm_only', desc: `${fmtDate(rt.date)} 오후 송영만 (${actual}분)` });
                }
              } else {
                // 오전=오후 시간 동일, 구분 불가
                amDates.push(rt.date);
                u.exceptions.push({ date: rt.date, type: 'partial', desc: `${fmtDate(rt.date)} 한 방향만 (${actual}분)` });
              }
            } else if (u.am_min && !u.pm_min) {
              amDates.push(rt.date);
              if (actual > u.am_min) {
                pmDates.push(rt.date);
                if (!detectedExtraMin) detectedExtraMin = actual - u.am_min;
                u.exceptions.push({ date: rt.date, type: 'extra_pm', desc: `${fmtDate(rt.date)} 오후 송영 추가 (${actual}분)` });
              }
            } else if (u.pm_min && !u.am_min) {
              pmDates.push(rt.date);
              if (actual > u.pm_min) {
                amDates.push(rt.date);
                if (!detectedExtraMin) detectedExtraMin = actual - u.pm_min;
                u.exceptions.push({ date: rt.date, type: 'extra_am', desc: `${fmtDate(rt.date)} 오전 송영 추가 (${actual}분)` });
              }
            }
          }

          // 추가 방향 per-trip 시간 설정
          if (!u.pm_min && pmDates.length > 0) u.pm_min = detectedExtraMin || u.am_min;
          if (!u.am_min && amDates.length > 0) u.am_min = detectedExtraMin || u.pm_min;

          u.am_day_count = amDates.length;
          u.pm_day_count = pmDates.length;
          u.am_date_range = dateRange(amDates);
          u.pm_date_range = dateRange(pmDates);

          // 3번줄 데이터 (오전≠오후인 이용자의 30분 별도일)
          u.exc_day_count = excDates.length;
          u.exc_per_min = excPerMin;
          u.exc_date_range = dateRange(excDates);
          const excTotal = excPerMin * excDates.length;
          u.exc_hours_str = excDates.length > 0 ? fmtH(excTotal) : '';

          // 실제 총시간 합계로 비용 계산 (가장 정확)
          const actualTotalMin = u.row_times.reduce((sum, rt) => sum + rt.min, 0);
          const amTotal = (u.am_min || 0) * u.am_day_count;
          const pmTotal = (u.pm_min || 0) * u.pm_day_count;

          u.am_hours_str = u.am_day_count > 0 && u.am_min ? fmtH(amTotal) : null;
          u.pm_hours_str = u.pm_day_count > 0 && u.pm_min ? fmtH(pmTotal) : null;
          u.total_hours_int = Math.floor(actualTotalMin / 60);
          u.total_remain_min = actualTotalMin % 60;
          u.total_time_str = fmtH(actualTotalMin);
          // 실제 분 기준 비용 계산, 10원 단위 절사
          u.final_cost = Math.floor(actualTotalMin * u.unit_price / 60 / 10) * 10;
        }
        resolve({users, month: month || new Date().getMonth()+1});
      } catch(err) { reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

async function processHwpx(hwpxFile, usersData, newMonth) {
  const buf = await hwpxFile.arrayBuffer();
  const zip = await JSZip.loadAsync(buf);
  const sectionFile = zip.file('Contents/section0.xml');
  if (!sectionFile) throw new Error('section0.xml을 찾을 수 없습니다.');
  const xmlStr = await sectionFile.async('string');
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'application/xml');
  const ns = 'http://www.hancom.co.kr/hwpml/2011/paragraph';
  const tEls = Array.from(doc.getElementsByTagNameNS(ns, 't'));
  const mm = String(newMonth).padStart(2, '0');

  let oldMonthStr = null;
  for (const t of tEls) {
    const txt = t.textContent || '';
    if (txt.includes('년') && txt.includes('월')) {
      const m = txt.match(/(\d{2})월/);
      if (m) { oldMonthStr = m[1]; break; }
    }
  }
  if (!oldMonthStr) throw new Error('이전 달 월 정보를 찾을 수 없습니다.');

  const oldDateRe = new RegExp(`^${oldMonthStr}\\.\\d{2}~${oldMonthStr}\\.\\d{2}$`);
  const oldSingleRe = new RegExp(`^${oldMonthStr}\\.\\d{2}$`);
  let curUser = null, curDir = null, clearing = false, dirCount = 0;
  const warnings = [];

  for (let i = 0; i < tEls.length; i++) {
    const el = tEls[i];
    let txt = el.textContent || '';
    let s = txt.trim();

    if (txt.includes('년') && txt.includes('월') && txt.includes(oldMonthStr+'월')) {
      el.textContent = txt.replace(oldMonthStr+'월', mm+'월'); continue;
    }
    if (s === '이용자명') {
      curDir = null; clearing = false; dirCount = 0;
      for (let j = i+1; j < Math.min(i+10, tEls.length); j++) {
        const nt = (tEls[j].textContent||'').trim();
        if (nt && nt !== '그룹유형/급여유형' && !nt.includes('/') && nt.length >= 2 && nt.length <= 5) { curUser = nt; break; }
      }
      continue;
    }
    if (!curUser || !usersData[curUser]) continue;
    const u = usersData[curUser];
    // am_day_count/pm_day_count 기반 판단 (추가 방향 감지 반영)
    const pmOnly = (u.am_day_count === 0 && u.pm_day_count > 0);
    const amOnly = (u.am_day_count > 0 && u.pm_day_count === 0);

    if (['주거지→','거주지→','제공기관→'].includes(s)) {
      dirCount++;
      const det = ['주거지→','거주지→'].includes(s) ? 'am' : 'pm';
      if (pmOnly) {
        if (dirCount === 1) {
          curDir = 'pm'; clearing = false;
          if (det === 'am') {
            el.textContent = '제공기관→';
            for (let j=i+1; j<Math.min(i+3,tEls.length); j++)
              if ((tEls[j].textContent||'').trim()==='제공기관') { tEls[j].textContent='주거지'; break; }
          }
        } else { curDir = det; clearing = true; el.textContent = ''; }
      } else if (amOnly) {
        if (dirCount === 1) {
          curDir = 'am'; clearing = false;
          if (det === 'pm') {
            el.textContent = '주거지→';
            for (let j=i+1; j<Math.min(i+3,tEls.length); j++)
              if ((tEls[j].textContent||'').trim()==='주거지') { tEls[j].textContent='제공기관'; break; }
          }
        } else { curDir = det; clearing = true; el.textContent = ''; }
      } else {
        // 양방향 이용자
        if (dirCount <= 2) { curDir = det; clearing = false; }
        else if (dirCount === 3) {
          if (u.exc_day_count > 0) { curDir = 'exc'; clearing = false; }
          else { curDir = det; clearing = true; el.textContent = ''; }
        } else { curDir = det; clearing = true; el.textContent = ''; }
      }
    } else if (s.includes('총 송영서비스 이용시간')) { curDir = 'total'; clearing = false; }
    else if (/^[1-4]$/.test(s)) clearing = false;
    else if (['송영서비스 제공 내역','송영서비스 시간 및 이용','연번','보호자'].includes(s)) clearing = false;

    if (clearing && (curDir==='am'||curDir==='pm'||curDir==='exc')) {
      const stru = ['1','2','3','4','연번','구분','일시 및 시간','장소','산출내역','송영시간','총 송영서비스 이용시간','송영서비스 시간 및 이용','송영서비스 제공 내역'];
      if (s && !stru.includes(s) && !s.startsWith('※')) { el.textContent = ''; continue; }
    }

    // 방향별 per-trip 분, 일수, 날짜범위, 시간문자열
    let dMin, dHrs, dDays, dDateRange;
    if (curDir==='am') { dMin=u.am_min; dHrs=u.am_hours_str||''; dDays=u.am_day_count; dDateRange=u.am_date_range; }
    else if (curDir==='pm') { dMin=u.pm_min; dHrs=u.pm_hours_str||''; dDays=u.pm_day_count; dDateRange=u.pm_date_range; }
    else if (curDir==='exc') { dMin=u.exc_per_min; dHrs=u.exc_hours_str||''; dDays=u.exc_day_count; dDateRange=u.exc_date_range; }
    else { dMin=u.am_min||u.pm_min; dHrs=u.am_hours_str||u.pm_hours_str||''; dDays=u.day_count; dDateRange=u.date_range; }

    const prev = [];
    for (let k=Math.max(0,i-5); k<i; k++) { const t2=(tEls[k].textContent||'').trim(); if(t2) prev.push(t2); }
    const fmtCost = n => n.toLocaleString();

    if (oldDateRe.test(s)) el.textContent = dDays > 0 ? dDateRange : '';
    else if (oldSingleRe.test(s)) el.textContent = dDays > 0 ? dDateRange : '';
    else if (/^\d+분?\s*×\d+일$/.test(s)) el.textContent = dMin && dDays > 0 ? `${dMin}분×${dDays}일` : '';
    else if (/^\d+×\d+일$/.test(s)) el.textContent = dMin && dDays > 0 ? `${dMin}분×${dDays}일` : '';
    else if (/^\d+시간\d+분$/.test(s)) {
      if (prev.includes('총 송영서비스 이용시간')||prev.includes('제공시간')||prev.includes('바우처'))
        el.textContent = u.total_time_str;
      else el.textContent = dHrs || '';
    } else if (/^\d+분$/.test(s)) {
      if (prev.some(p=>p.includes('×')||p.includes('일'))) el.textContent = dHrs || '';
    } else if (/^\d+시간$/.test(s)) {
      if (prev.includes('총 송영서비스 이용시간')||prev.includes('제공시간')||prev.includes('바우처'))
        el.textContent = u.total_time_str;
      else el.textContent = dHrs || '';
    } else if (/^\d+시간(\d+분)?×[\d,]+원?$/.test(s)||/^\d+시간(\d+분)?×[\d,]*$/.test(s))
      el.textContent = `${u.total_time_str}×${fmtCost(u.unit_price)}원`;
    else if (/^×[\d,]+원?$/.test(s)) el.textContent = `×${fmtCost(u.unit_price)}원`;
    else if (/^[\d,]+원$/.test(s) && s.length > 4) el.textContent = `${fmtCost(u.final_cost)}원`;
    else if (/^[\d,]+$/.test(s) && s.includes(',') && s.length >= 4) el.textContent = `${fmtCost(u.final_cost)}원`;
    else if (/^=[\d,]+원$/.test(s)) el.textContent = `=${fmtCost(u.final_cost)}원`;
  }

  const found = new Set();
  for (const t of tEls) { const v=(t.textContent||'').trim(); if(usersData[v]) found.add(v); }
  for (const n of Object.keys(usersData)) if(!found.has(n)) warnings.push(`⚠️ '${n}' - 엑셀에는 있지만 HWPX 문서에 없습니다!`);

  const newXml = new XMLSerializer().serializeToString(doc);
  zip.file('Contents/section0.xml', newXml);
  const blob = await zip.generateAsync({type:'blob', compression:'DEFLATE'});
  return { blob, warnings };
}

async function doGenerate() {
  const hwpx = document.getElementById('hwpxFile');
  const excel = document.getElementById('excelFile');
  const trip = document.getElementById('tripFile');
  const msgA = document.getElementById('msgArea');
  const resA = document.getElementById('resultArea');
  const prog = document.getElementById('progress');
  const btn = document.getElementById('genBtn');
  msgA.innerHTML = ''; resA.innerHTML = '';

  if (!hwpx.files[0]||!excel.files[0]||!trip.files[0]) {
    msgA.innerHTML = '<div class="msg err">세 파일 모두 선택해 주세요.</div>'; return;
  }
  btn.disabled = true; prog.style.display = 'block'; prog.textContent = '① 송영정보 파싱 중...';
  try {
    const tripInfo = await parseTripInfo(trip.files[0]);
    prog.textContent = '② 송영서비스 엑셀 파싱 중...';
    const { users, month } = await parseExcel(excel.files[0], tripInfo);
    prog.textContent = '③ HWPX 문서 교체 중...';
    const { blob, warnings } = await processHwpx(hwpx.files[0], users, month);
    prog.style.display = 'none';

    const yr = new Date().getFullYear();
    const fn = `주간활동송영서비스_${yr}.${String(month).padStart(2,'0')}.hwpx`;
    const url = URL.createObjectURL(blob);

    const names = Object.keys(users).sort();
    let rows = '';
    let excUsers = []; // 예외상황 있는 이용자
    names.forEach((n,idx) => {
      const u = users[n];
      const hasExc = u.exceptions && u.exceptions.length > 0;
      const trClass = hasExc ? ' class="has-exception"' : '';

      // 오전/오후 정보에 예외 뱃지 추가
      let amInfo = u.am_day_count > 0 ? `${u.am_min}분×${u.am_day_count}일` : '-';
      let pmInfo = u.pm_day_count > 0 ? `${u.pm_min}분×${u.pm_day_count}일` : '-';
      if (hasExc) {
        const excTypes = new Set(u.exceptions.map(e => e.type));
        let badges = '';
        if (excTypes.has('partial_day')) {
          const cnt = u.exceptions.filter(e => e.type==='partial_day').length;
          badges += `<span class="exc-badge early">3번줄 ${cnt}일</span>`;
        }
        if (excTypes.has('am_only') || excTypes.has('partial')) {
          const cnt = u.exceptions.filter(e => e.type==='am_only'||e.type==='partial').length;
          badges += `<span class="exc-badge early">오전만 ${cnt}일</span>`;
        }
        if (excTypes.has('pm_only')) {
          const cnt = u.exceptions.filter(e => e.type==='pm_only').length;
          badges += `<span class="exc-badge late">오후만 ${cnt}일</span>`;
        }
        if (excTypes.has('extra_pm')) {
          const cnt = u.exceptions.filter(e => e.type==='extra_pm').length;
          badges += `<span class="exc-badge extra">오후추가 ${cnt}일</span>`;
        }
        if (excTypes.has('extra_am')) {
          const cnt = u.exceptions.filter(e => e.type==='extra_am').length;
          badges += `<span class="exc-badge extra">오전추가 ${cnt}일</span>`;
        }
        excUsers.push({ name: n, exceptions: u.exceptions, badges });
      }

      rows += `<tr${trClass}><td>${idx+1}</td><td>${n}${hasExc ? ' ⚠' : ''}</td><td>${u.group_str}</td>
        <td>${amInfo}</td><td>${pmInfo}</td>
        <td>${u.day_count}일</td><td>${u.date_range}</td><td>${u.total_time_str}</td>
        <td>${u.unit_price.toLocaleString()}원</td><td>${u.final_cost.toLocaleString()}원</td></tr>`;
    });

    let wHtml = warnings.length ? `<div class="warn-list">${warnings.join('<br>')}</div>` : '';

    // 예외상황 상세
    let excHtml = '';
    if (excUsers.length > 0) {
      let excItems = excUsers.map(eu => {
        const lines = eu.exceptions.map(e => {
          let icon = '';
          if (e.type === 'partial_day') icon = '🟡';
          else if (e.type === 'am_only' || e.type === 'partial') icon = '🟠';
          else if (e.type === 'pm_only') icon = '🟣';
          else icon = '🔵';
          return `<div class="exc-item">${icon} ${e.desc}</div>`;
        }).join('');
        return `<div class="exc-user"><strong>${eu.name}</strong> ${eu.badges}${lines}</div>`;
      }).join('');
      excHtml = `<div class="exc-detail"><h3>⚠ 예외상황 ${excUsers.length}명</h3>${excItems}</div>`;
    }

    resA.innerHTML = `<div class="result">
      <h2>${month}월 송영서비스 처리 완료</h2>
      <div class="info">총 ${names.length}명 처리 완료${excUsers.length > 0 ? ` (예외 ${excUsers.length}명)` : ''}</div>
      <a class="dl-btn" href="${url}" download="${fn}">문서 다운로드 (${fn})</a>
      ${wHtml}${excHtml}
      <table class="data"><thead><tr>
        <th>No</th><th>이용자명</th><th>그룹</th><th>오전</th><th>오후</th>
        <th>일수</th><th>날짜범위</th><th>총시간</th><th>단가</th><th>비용</th>
      </tr></thead><tbody>${rows}</tbody></table></div>`;
    msgA.innerHTML = '<div class="msg ok">문서가 성공적으로 생성되었습니다.</div>';
  } catch(err) {
    prog.style.display = 'none';
    msgA.innerHTML = `<div class="msg err">오류: ${err.message||err}</div>`;
    console.error(err);
  } finally { btn.disabled = false; }
}
</script>
</body>
</html>
